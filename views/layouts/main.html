<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <meta name="description"
        content="Agung Prayogi — Full-Stack Developer & Data Analyst specializing in PHP (Laravel), Python, and Data Visualization.">
    <meta name="author" content="Agung Prayogi">
    <meta property="og:title" content="{{.Title}}">
    <meta property="og:description"
        content="Portfolio of Agung Prayogi — Crafting robust web systems and data-driven insights.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Global Cinematic Elements -->
    <div class="noise-overlay"></div>
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>

    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="loader-content">
            <span class="loader-text">AGUNG PRAYOGI</span>
            <div class="loader-bar"></div>
        </div>
    </div>

    <header class="header-split">
        <div class="logo-ap">AP — 2026 (c)</div>
        <button class="menu-trigger">
            <span></span>
            MENU
        </button>
    </header>

    <main>
        {{embed}}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Agung Prayogi. All rights reserved.</p>
            <p class="footer-sub">Crafting Excellence with Code &amp; Data ⚡</p>
        </div>
    </footer>

    <!-- Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script src="/js/main.js"></script>
</body>

</html>
